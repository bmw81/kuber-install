---
- name: Настройка и запуск kubelet
  hosts: all
  become: yes
  tasks:
    - name: 1. Полное отключение swap
      ansible.builtin.shell:
        cmd: |
          # Отключить swap
          swapoff -a
          # Удалить swap из fstab
          sed -i '/ swap / s/^/#/' /etc/fstab
          # Отключить swap файл если есть
          if [ -f /swap.img ]; then
            swapoff /swap.img 2>/dev/null || true
            rm -f /swap.img 2>/dev/null || true
          fi
          # Проверить что swap отключен
          if swapon --show | grep -q .; then
            echo "WARNING: Swap still active!"
            exit 1
          fi
      changed_when: true
      register: swap_disable

    - name: 2. Вывод результата отключения swap
      ansible.builtin.debug:
        msg: "Swap отключен на {{ inventory_hostname }}"
      when: swap_disable.changed

    - name: 3. Загрузка модулей ядра
      ansible.builtin.copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          overlay
          br_netfilter
      notify: reload_modules

    - name: 4. Настройка сетевых параметров
      ansible.builtin.copy:
        dest: /etc/sysctl.d/k8s.conf
        content: |
          net.bridge.bridge-nf-call-iptables  = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward                 = 1

    - name: 5. Применение sysctl
      ansible.builtin.shell:
        cmd: sysctl --system
      changed_when: false

    - name: 6. Создание директорий kubelet
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - /var/lib/kubelet
        - /var/lib/kubelet/config
        - /etc/kubernetes/manifests

    - name: 7. Создание конфигурации kubelet (с правильным cgroupDriver)
      ansible.builtin.copy:
        dest: /var/lib/kubelet/config.yaml
        content: |
          apiVersion: kubelet.config.k8s.io/v1beta1
          kind: KubeletConfiguration
          cgroupDriver: systemd
          containerRuntimeEndpoint: unix:///var/run/containerd/containerd.sock
          failSwapOn: false
          authentication:
            anonymous:
              enabled: false
            webhook:
              enabled: true
          authorization:
            mode: Webhook

    - name: 8. Проверка наличия kubelet бинарника
      ansible.builtin.stat:
        path: /usr/local/bin/kubelet
      register: kubelet_binary

    - name: 9. Скачивание kubelet если отсутствует
      ansible.builtin.get_url:
        url: "https://dl.k8s.io/release/v1.30.0/bin/linux/amd64/kubelet"
        dest: /usr/local/bin/kubelet
        mode: '0755'
        timeout: 300
      when: not kubelet_binary.stat.exists

    - name: 10. Создание systemd сервиса kubelet
      ansible.builtin.copy:
        dest: /etc/systemd/system/kubelet.service
        content: |
          [Unit]
          Description=kubelet: The Kubernetes Node Agent
          Documentation=https://kubernetes.io/docs/home/
          Wants=network-online.target containerd.service
          After=network-online.target containerd.service

          [Service]
          ExecStart=/usr/local/bin/kubelet \
            --config=/var/lib/kubelet/config.yaml \
            --container-runtime=remote \
            --container-runtime-endpoint=unix:///var/run/containerd/containerd.sock \
            --fail-swap-on=false
          Restart=always
          StartLimitInterval=0
          RestartSec=10

          [Install]
          WantedBy=multi-user.target

    - name: 11. Перезагрузка systemd и запуск kubelet
      ansible.builtin.systemd:
        name: kubelet
        daemon_reload: yes
        enabled: yes
        state: restarted

    - name: 12. Проверка статуса kubelet
      ansible.builtin.shell:
        cmd: systemctl status kubelet --no-pager
      register: kubelet_status
      ignore_errors: yes
      changed_when: false

    - name: 13. Вывод статуса
      ansible.builtin.debug:
        msg: "{{ kubelet_status.stdout_lines }}"

    - name: 14. Проверка что swap действительно отключен
      ansible.builtin.shell:
        cmd: swapon --show
      register: swap_check
      changed_when: false

    - name: 15. Проверка swap
      ansible.builtin.debug:
        msg: "ВНИМАНИЕ: Swap всё ещё включен! {{ swap_check.stdout }}"
      when: swap_check.stdout != ""

  handlers:
    - name: reload_modules
      ansible.builtin.shell:
        cmd: |
          modprobe overlay
          modprobe br_netfilter
